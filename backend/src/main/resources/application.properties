# Server
server.port=8081

# Datasource
# Defaults are intentionally local-first so the app runs with no external database.
# Set SPRING_DATASOURCE_URL/USERNAME/PASSWORD in deployment to use PostgreSQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:campusnote;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# SQL init
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=${SPRING_DATASOURCE_TEST_QUERY:SELECT 1}

# Session cookie
# Local HTTP needs SameSite=Lax and secure=false. Override in deployment if HTTPS
# cross-site cookies are required.
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=CAMPUSNOTE_SESSION
server.servlet.session.timeout=1h

# Admin configuration
campusnote.admin.email=${ADMIN_EMAIL:admin@arel.edu.tr}
campusnote.admin.password=${ADMIN_PASSWORD:admin123}

# Actuator health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.campusnote=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=WARN

# AI service
campusnote.ai-service-url=http://localhost:9000/evaluate
