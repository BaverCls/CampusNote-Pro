# Server
server.port=8080

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# SQL init
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=${SPRING_DATASOURCE_TEST_QUERY:SELECT 1}

# Session cookie
# Local HTTP needs SameSite=Lax and secure=false. Override in deployment if HTTPS
# cross-site cookies are required.
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=CAMPUSNOTE_SESSION
server.servlet.session.timeout=1h
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

# Admin configuration
campusnote.admin.email=${ADMIN_EMAIL:}
campusnote.admin.password=${ADMIN_PASSWORD:}

# Actuator health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.campusnote=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=WARN

# AI service
campusnote.ai-service-url=http://127.0.0.1:9000/evaluate

# Cloudflare R2 Configurations
campusnote.r2.enabled=${R2_ENABLED:false}
campusnote.r2.endpoint=${R2_ENDPOINT:}
campusnote.r2.account-id=${R2_ACCOUNT_ID:}
campusnote.r2.access-key-id=${R2_ACCESS_KEY_ID:}
campusnote.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
campusnote.r2.bucket-name=${R2_BUCKET_NAME:}
campusnote.r2.region=${R2_REGION:auto}
campusnote.r2.presigned-url-ttl-seconds=${R2_PRESIGNED_URL_TTL_SECONDS:300}
campusnote.r2.max-file-size-mb=${R2_MAX_FILE_SIZE_MB:50}

# Spring Multipart Limits
spring.servlet.multipart.max-file-size=${R2_MAX_FILE_SIZE_MB:50}MB
spring.servlet.multipart.max-request-size=${R2_MAX_FILE_SIZE_MB:50}MB

