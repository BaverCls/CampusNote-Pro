# ── Datasource ──────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── SQL Init — Production'da kapat! ─────────────────────────────────────────
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ── Hikari Connection Pool (Supabase PgBouncer / transaction pooler) ─────────
# Port 6543 = PgBouncer transaction mode; pool boyutu küçük tutulmalı
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── Session Cookie (Cross-Domain / Render Fix) ───────────────────────────────
# Frontend ve backend farklı subdomain'lerde → SameSite=None + Secure zorunlu
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=CAMPUSNOTE_SESSION
server.servlet.session.timeout=1h

# ── Admin Configuration ───────────────────────────────────────────────────────
campusnote.admin.email=${ADMIN_EMAIL}
campusnote.admin.password=${ADMIN_PASSWORD}

# ── Actuator Health Check (Render Health Check için) ────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.campusnote=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=WARN
